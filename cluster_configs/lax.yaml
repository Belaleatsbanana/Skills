executor: slurm

ssh_tunnel:
  host: lax
  user: bihu
  job_dir: /lustre/fsw/portfolios/llmservice/users/bihu/nemo-run
  identity: /home/binhu/.ssh/id_rsa

account: llmservice_nemo_reasoning
partition: batch
cpu_partition: cpu_short
job_name_prefix: ""

containers:
  trtllm: /lustre/fsw/portfolios/llmservice/users/igitman/images/nemo-skills-trtllm-latest.sqsh
  vllm: /lustre/fsw/portfolios/llmservice/users/igitman/images/nemo-skills-vllm-latest.sqsh
  sglang: /lustre/fsw/portfolios/llmservice/users/igitman/images/nemo-skills-sglang-latest.sqsh
  nemo-rl: /lustre/fsw/portfolios/llmservice/users/wedu/images/nemo-rl:super-v3-posttraining_20260204.squashfs
  megatron: /lustre/fsw/portfolios/llmservice/users/igitman/images/nemo-skills-megatron-latest.sqsh
  sandbox: /lustre/fsw/portfolios/llmservice/users/igitman/images/nemo-skills-sandbox-latest.sqsh
  nemo-skills: /lustre/fsw/portfolios/llmservice/users/igitman/images/nemo-skills-latest.sqsh
  verl: /lustre/fsw/portfolios/llmservice/users/igitman/images/nemo-skills-verl-latest.sqsh

mounts:
  - /lustre/fsw/portfolios/llmservice/users/bihu:/workspace
  - /lustre/fsw/portfolios/llmservice:/lustre/fsw/portfolios/llmservice
  - /scratch:/scratch
  - /scratch/fsw/portfolios/llmservice/users/bihu/sadegh/migrate/nemo-rl-internal/nemo_rl:/opt/nemo-rl/nemo_rl
  - /scratch/fsw/portfolios/llmservice/users/bihu/sadegh/migrate/Gym:/opt/nemo-rl/3rdparty/Gym-workspace/Gym

env_vars:
  - HF_HOME=/scratch/fsw/portfolios/llmservice/users/bihu/hf_home
  - HF_HUB_CACHE=/scratch/fsw/portfolios/llmservice/users/bihu/hf_home/hub
  - HF_DATASETS_CACHE=/scratch/fsw/portfolios/llmservice/users/bihu/hf_datasets_cache
  - UV_CACHE_DIR=/scratch/fsw/portfolios/llmservice/users/bihu/uv_cache
  - HF_TOKEN
  - WANDB_API_KEY
  - VLLM_PRECOMPILED_WHEEL_LOCATION=https://github.com/vllm-project/vllm/releases/download/v0.13.0/vllm-0.13.0-cp38-abi3-manylinux_2_31_x86_64.whl
  - NRL_VLLM_USE_V1=1
  - NRL_IGNORE_VERSION_MISMATCH=1
  - VLLM_ATTENTION_BACKEND=FLASH_ATTN
  - NRL_FORCE_REBUILD_VENVS=false
  - RAY_ENABLE_UV_RUN_RUNTIME_ENV=0
  - UV_HTTP_TIMEOUT=300
  - VLLM_USE_PRECOMPILED=1
  - OMP_NUM_THREADS=16
  - RAY_DEDUP_LOGS=1

ray_template: ray_enroot.sub.j2

timeouts:
  batch: 04:00:00
  interactive: 04:00:00
  cpu_short: 04:00:00

mail_type: FAIL
