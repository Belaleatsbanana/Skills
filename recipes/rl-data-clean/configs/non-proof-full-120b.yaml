# Full non-proof pipeline using gpt-oss-120b
# Extracts and cleans non-proof math problems from AOPS data

cluster: dfw
base_output_dir: /workspace/rl-data-clean/non-proof
model_name: gpt-oss-120b
expname: non-proof-${model_name}
suffix: full-pipeline

# Full dataset
input_file: ${base_output_dir}/raw_aops_data.jsonl

# Model configuration
generate_kwargs:
  model: /hf_models/${model_name}
  server_type: vllm
  server_gpus: 8
  server_nodes: 1
  num_chunks: 5  # Increase for large dataset

# Pipeline stages
pipeline_stages:
  - extract_problems
  - classify_problems  # Serial filtering: proof -> mcq -> binary -> invalid
  - assess_problem_quality  # NEW: Assess problem-only quality first
  - extract_answers
  - assess_problem_answer_quality
  - extract_solution
  - assess_complete_solution_quality

# Output directories
directories:
  step-1-extract: ${base_output_dir}/${model_name}/step-1-extract-problems
  step-2-classify: ${base_output_dir}/${model_name}/step-2-classify-problems
  step-3-problem-quality: ${base_output_dir}/${model_name}/step-3-assess-problem-quality
  step-4-extract-answers: ${base_output_dir}/${model_name}/step-4-extract-answers
  step-5-problem-answer: ${base_output_dir}/${model_name}/step-5-assess-problem-answer
  step-6-extract-solution: ${base_output_dir}/${model_name}/step-6-extract-solution
  step-7-complete-solution: ${base_output_dir}/${model_name}/step-7-assess-complete-solution

# Stage configurations
stages:
  extract_problems:
    output_dir: ${directories.step-1-extract}
    input_file: ${input_file}
    dependencies: null
    stage_kwargs: ${generate_kwargs}

  # Classification stage with serial filtering
  # Order: proof -> mcq -> binary -> invalid
  # Final output: step-2-classify/invalid/no.jsonl (valid non-proof problems)
  classify_problems:
    output_dir: ${directories.step-2-classify}
    input_file: ${directories.step-1-extract}/extracted-problems.jsonl
    modes:
      - proof
      - mcq
      - binary
      - invalid
    dependencies:
      - extract_problems
    stage_kwargs: ${generate_kwargs}

  # NEW: Assess problem quality first (before extracting answers)
  assess_problem_quality:
    output_dir: ${directories.step-3-problem-quality}
    input_file: ${directories.step-2-classify}/invalid/no.jsonl  # Valid non-proof problems
    dependencies:
      - classify_problems
    stage_kwargs: ${generate_kwargs}

  # Extract answers from high-quality problems only
  extract_answers:
    output_dir: ${directories.step-4-extract-answers}
    input_file: ${directories.step-3-problem-quality}/accepted.jsonl  # Only high-quality problems
    dependencies:
      - assess_problem_quality
    stage_kwargs: ${generate_kwargs}

  # Assess problem + answer quality
  assess_problem_answer_quality:
    output_dir: ${directories.step-5-problem-answer}
    input_file: ${directories.step-4-extract-answers}/extracted-answers.jsonl
    dependencies:
      - extract_answers
    stage_kwargs: ${generate_kwargs}

  # Extract solution from problems with good problem+answer
  extract_solution:
    output_dir: ${directories.step-6-extract-solution}
    input_file: ${directories.step-5-problem-answer}/accepted.jsonl  # Only good problem+answer pairs
    dependencies:
      - assess_problem_answer_quality
    stage_kwargs: ${generate_kwargs}

  # Final quality assessment - Complete triplet
  assess_complete_solution_quality:
    output_dir: ${directories.step-7-complete-solution}
    input_file: ${directories.step-6-extract-solution}/extracted-solutions.jsonl
    dependencies:
      - extract_solution
    stage_kwargs: ${generate_kwargs}
