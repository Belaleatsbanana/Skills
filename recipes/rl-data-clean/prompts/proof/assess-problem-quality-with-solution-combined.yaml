# One-shot: solve the problem, then judge it using your own solution (解题+判断). Input: only {problem}.
# Output: your proof, then assessment block (same keys for postprocess: DECISION, DIFFICULTY_ESTIMATE, etc.).
user: |-
  You are an expert at solving and evaluating IMO-style proof problems.

  Step 1 — Solve: Attempt a complete proof for the problem below. If the problem is ambiguous or you cannot finish, explain what is missing or where you are stuck.

  Step 2 — Assess: Using your solution attempt as evidence, judge whether this problem is good for IMO-level training. Output the assessment in the exact format at the end.

  ---
  Problem:
  {problem}
  ---

  First provide your proof, then your assessment.

  PROOF:
  <your step-by-step proof here>

  ---
  ASSESSMENT (use your proof attempt as evidence):

  CLARITY_ANALYSIS:
  <Was the problem clear? Did you understand what to prove? Any ambiguities?>

  MATHEMATICAL_RIGOR_ANALYSIS:
  <Statement valid? Conditions sufficient? Issues?>

  DIFFICULTY_ESTIMATE: <exactly one of: P1, P2, P3, P4, P5, P6, TOO_SIMPLE, UNCLEAR>

  CRITICAL_ISSUES:
  <Serious issues or "None">

  DECISION: <ACCEPT or REJECT>
  DECISION_REASONING: <Why accept/reject, referring to problem and your solution attempt.>

  Output:
