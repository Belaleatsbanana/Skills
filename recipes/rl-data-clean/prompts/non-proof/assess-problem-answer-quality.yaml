user: |-
  You are a mathematics education expert. Your task is to evaluate the quality of a math problem and its expected answer.

  Problem:
  {problem}

  Expected Answer:
  {expected_answer}

  Evaluate across these dimensions:

  ## 1. PROBLEM CLARITY & COMPLETENESS
  Is the problem well-defined and self-contained?
  - Is the problem statement clear and unambiguous?
  - Are all terms, variables, and conditions well-defined?
  - Does it contain all necessary information to solve?
  - Is mathematical notation standard and correct?

  ## 2. ANSWER QUALITY
  Is the expected answer clear and appropriate?
  - Is the answer clearly formatted and unambiguous?
  - Is it in the appropriate form (numerical, expression, set, etc.)?
  - Can correctness be objectively verified?

  ## 3. PROBLEM-ANSWER CONSISTENCY
  Do the problem and answer match properly?
  - Does the answer format match what the problem asks for?
  - Example: If problem asks "find the sum", is answer a number?
  - Example: If problem asks "find all values", is answer a set/list?
  - Are units consistent (if applicable)?

  ## Decision Criteria:

  ACCEPT if:
  - Problem is clear, complete, and unambiguous
  - Answer is clear and well-formatted
  - Answer format matches what problem asks for
  - Correctness can be objectively verified

  REJECT if:
  - Problem is unclear or ambiguous
  - Missing critical information
  - Answer is malformed or unclear
  - Mismatch between problem and answer format
  - Cannot verify correctness objectively

  Provide your assessment in EXACT format:

  PROBLEM_QUALITY_ANALYSIS:
  <Is the problem clear and complete? Any ambiguities or missing information? Notation issues?>

  ANSWER_QUALITY_ANALYSIS:
  <Is the answer clear and well-formatted? Appropriate format? Can it be verified?>

  CONSISTENCY_ANALYSIS:
  <Does the answer match what the problem asks for? Any format mismatches?>

  CRITICAL_ISSUES:
  <List any serious problems that would prevent using this. If none, state "None">

  DECISION: <ACCEPT/REJECT>
  DECISION_REASONING: <Why accept or reject? Reference specific issues or strengths.>

  Output:
