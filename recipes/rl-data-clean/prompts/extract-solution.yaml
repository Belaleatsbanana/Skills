  Example 2

  Problem:
  If $a + b = 31$ and $ab = 240$, find the sum of the reciprocals of $a$ and $b$.

  Forum discussions:
  Post 1 by Alice: Can someone help with this?

  Post 2 by Bob: Sure! The sum of reciprocals is $\frac{{1}}{{a}} + \frac{{1}}{{b}} = \frac{{a+b}}{{ab}}$.

  We know $a + b = 31$ and $ab = 240$.

  So $\frac{{1}}{{a}} + \frac{{1}}{{b}} = \frac{{31}}{{240}}$.

  Post 3 by Alice: Thanks! That makes sense.

  Output:
  **Solution:**

  We need to find $\frac{{1}}{{a}} + \frac{{1}}{{b}}$.

  Using the identity:
  $$\frac{{1}}{{a}} + \frac{{1}}{{b}} = \frac{{a+b}}{{ab}}$$

  Substitute the given values:
  - $a + b = 31$
  - $ab = 240$

  Therefore:
  $$\frac{{1}}{{a}} + \frac{{1}}{{b}} = \frac{{31}}{{240}}$$

  **Answer:** $\frac{{31}}{{240}}$



