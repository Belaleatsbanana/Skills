  Example 1

  Problem:
  Let $EFGH$, $EFDC$, and $EHBC$ be three adjacent square faces of a cube, for which $EC = 8$. Let $I$, $J$, and $K$ be points on $\overline{{EF}}$, $\overline{{EH}}$, and $\overline{{EC}}$ respectively, so that $EI = EJ = EK = 2$. A solid $S$ is obtained by drilling a tunnel through the cube. Find $m + n + p$ where the surface area is $m + n\sqrt{{p}}$.

  Forum discussions:
  Post 1 by user123: Let's set up coordinates. Place $E$ at origin. Since the cube has side 8, we can place vertices accordingly.

  The three adjacent faces share vertex $E$. Let $E = (0,0,0)$, $F = (8,0,0)$, $H = (0,8,0)$, $C = (0,0,8)$.

  Then $I = (2,0,0)$, $J = (0,2,0)$, $K = (0,0,2)$.

  The tunnel is formed by planes parallel to $\overline{{AE}}$ where $A$ is the eighth vertex at $(8,8,8)$.

  The direction vector of $AE$ is $(8,8,8) - (0,0,0) = (8,8,8)$ or simplified $(1,1,1)$.

  For the surface area calculation:
  - Original cube surface area: $6 \times 8^2 = 384$
  - The tunnel removes area from three faces: $3 \times (2 \times 2) = 12$
  - The tunnel adds internal surface area. Each wall is a parallelogram.

  The three edges $IJ$, $JK$, $KI$ form a triangle. Length $IJ = \sqrt{{(2-0)^2 + (0-2)^2 + 0^2}} = 2\sqrt{{2}}$.
  Similarly $JK = 2\sqrt{{2}}$ and $KI = 2\sqrt{{2}}$.

  The perimeter of triangle $IJK$ is $6\sqrt{{2}}$.

  The tunnel extends through the cube along direction $(1,1,1)$. The length is $8\sqrt{{3}}$.

  Tunnel wall area = perimeter × length = $6\sqrt{{2}} \times 8\sqrt{{3}} = 48\sqrt{{6}}$.

  Total surface area: $384 - 12 + 48\sqrt{{6}} = 372 + 48\sqrt{{6}}$.

  Therefore $m = 372$, $n = 48$, $p = 6$.

  Answer: $m + n + p = 372 + 48 + 6 = 426$.

