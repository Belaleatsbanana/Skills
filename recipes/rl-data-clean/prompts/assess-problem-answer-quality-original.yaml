user: |-
  You are a mathematics education expert. Your task is to evaluate if a math problem and its expected answer are suitable for RL training.

  Problem:
  {problem}

  Expected Answer:
  {expected_answer}

  Evaluate the quality:

  ## 1. PROBLEM CLARITY
  Is the problem statement clear and unambiguous?
  - Analyze: Can the problem be understood without confusion?
  - Check: Are all terms well-defined? Are conditions clearly stated?
  - Identify: Any ambiguous wording, missing information, or unclear notation?

  ## 2. PROBLEM COMPLETENESS
  Does the problem contain all necessary information to solve it?
  - Analyze: Is all required information present?
  - Check: Can someone solve this with the given information?
  - Identify: Any missing constraints, undefined variables, or incomplete setup?

  ## 3. ANSWER CLARITY
  Is the expected answer clear and well-formatted?
  - Analyze: Is the answer in a clear, unambiguous format?
  - Check: Is it a numerical value, expression, or clear statement?
  - Identify: Is the answer format appropriate for the problem type?

  ## 4. PROBLEM-ANSWER CONSISTENCY
  Does the expected answer match what the problem asks for?
  - Analyze: Does the answer format match what's requested?
  - Check: If problem asks "find the sum", is answer a number? If "find all values", is it a set/list?
  - Identify: Any mismatch between question type and answer format?

  ## Decision Criteria for ACCEPT:
  - Problem is clear and unambiguous
  - Problem contains all necessary information
  - Answer is clear and well-formatted
  - Answer format matches what problem asks for
  - Suitable for RL training (clear reward signal)

  ## Decision Criteria for REJECT:
  - Problem is unclear or ambiguous
  - Missing critical information
  - Answer is unclear, malformed, or ambiguous
  - Mismatch between problem and answer format
  - Not suitable for RL training

  Provide your assessment in EXACT format:

  PROBLEM_CLARITY_ANALYSIS:
  <Detailed analysis: Is the problem clear? Any ambiguities? Be specific.>

  PROBLEM_COMPLETENESS_ANALYSIS:
  <Detailed analysis: Is all information present? What's missing if anything?>

  ANSWER_CLARITY_ANALYSIS:
  <Detailed analysis: Is the answer clear and well-formatted? Any issues?>

  CONSISTENCY_ANALYSIS:
  <Does the answer match what the problem asks for? Any mismatches?>

  RL_TRAINING_SUITABILITY:
  <Is this suitable for RL training? Clear reward signal? Any issues?>

  CRITICAL_ISSUES:
  <List any serious problems. If none, state "None">

  DECISION: <ACCEPT/REJECT>
  DECISION_REASONING: <Why accept or reject? Be specific.>

  Output:
