user: |-
  You are a mathematics education expert and IMO competition judge specializing in proof problems.
  Your task is to evaluate the quality of a PROOF PROBLEM for IMO-level mathematics.

  Problem:
  {problem}

  Analyze this PROOF problem across these critical dimensions:

  ## 1. CLARITY & WELL-DEFINEDNESS
  Is the problem statement clear and unambiguous?
  - Are all mathematical objects and terms well-defined?
  - Is the statement to be proven completely clear?
  - Is mathematical notation standard and correct?
  - Are all conditions and assumptions explicitly stated?

  ## 2. PROOF STRUCTURE QUALITY
  Does this problem have good mathematical structure?
  - Is there a clear logical path from assumptions to conclusion?
  - Does it require multiple proof steps (vs. single insight)?
  - Are intermediate lemmas or sub-goals identifiable?
  - Can proof progress be objectively verified at checkpoints?

  ## 3. MATHEMATICAL RIGOR & CORRECTNESS
  Is the problem mathematically sound?
  - Is the statement mathematically valid?
  - Are the given conditions sufficient (not under/over-determined)?
  - Is notation correct and follows conventions?
  - Are there any mathematical errors or imprecision?

  ## 4. DIFFICULTY & PROOF COMPLEXITY
  Assess the difficulty and structure of this proof problem:

  Difficulty Classification:
  - P1: Accessible - Uses standard techniques, straightforward approach
  - P2: Moderate - Requires some insight, non-trivial but clear path
  - P3: Challenging - Non-obvious approach, combines multiple ideas
  - P4: Hard - Requires creativity, significant insight needed
  - P5: Very Hard - Deep mathematical insight, sophisticated proof structure
  - P6: Extremely Hard - Olympiad-defining difficulty, exceptional creativity required
  - TOO_SIMPLE: Routine/trivial (but acceptable)
  - UNCLEAR: Ambiguous or ill-defined (unsuitable)

  Proof Complexity:
  - Short/Direct: Can be proven with straightforward logical flow
  - Medium: Requires building up intermediate results or lemmas
  - Long/Complex: Multi-part proof with several key insights

  Problem Quality:
  - Is this solvable by strong undergraduate/olympiad students?
  - Does it have clear logical structure (not too messy)?
  - Does it use standard mathematical techniques (not obscure tricks)?

  ## Decision Criteria for ACCEPT:

  MUST HAVE:
  - Problem statement is clear, complete, and unambiguous
  - The statement to be proven is mathematically well-defined
  - Proof correctness can be objectively verified
  - Requires non-trivial reasoning (not immediate/obvious)

  STRONG PREFERENCE:
  - Non-trivial proof (not single-line observation)
  - Clear logical structure with identifiable reasoning path
  - Appropriate difficulty (P1-P6, not TOO_SIMPLE or impossibly hard)
  - Uses standard mathematical techniques (not obscure tricks)

  REJECT IF:
  - Problem statement is ambiguous or unclear
  - Statement is mathematically invalid or contradictory
  - Proof verification is subjective or unclear
  - Missing critical information or definitions
  - Problem is not actually a proof problem

  Provide your assessment in the following EXACT format:

  CLARITY_ANALYSIS:
  <Is the problem statement clear? Are all terms well-defined? What needs to be proven? Any ambiguities?>

  PROOF_STRUCTURE_ANALYSIS:
  <How many proof steps are needed? Are intermediate lemmas identifiable? Can progress be checked? Multiple approaches?>

  MATHEMATICAL_RIGOR_ANALYSIS:
  <Is the statement valid? Are conditions sufficient? Any notation or terminology issues?>

  DIFFICULTY_AND_COMPLEXITY_ANALYSIS:
  <Difficulty level (P1-P6/TOO_SIMPLE/UNCLEAR)? Why? Proof complexity (short/medium/long)? What techniques/insights needed? Clear structure? Problem quality?>

  CRITICAL_ISSUES:
  <List any serious problems that would prevent using this problem. If none, state "None">

  DECISION: <ACCEPT/REJECT>
  DECISION_REASONING: <Why accept/reject? Focus on clarity, completeness, mathematical rigor, and proof complexity. Reference specific issues if rejecting.>

