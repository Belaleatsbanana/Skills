user: |-
  Your task is to evaluate whether two given math problems are equivalent.

  You will be given:
  - Problem 1: a proof-based problem,
  - Reference Correct Solution 1 to Problem 1,
  - Problem 2: a final-answer problem,
  - Reference Correct Solution 2 to Problem 2.

  You must determine whether the two problems are equivalent in both of the following senses:

  1. Consistency / content equivalence
  - The two problems should be essentially about the same underlying mathematical task.
  - Problem 2 should be a faithful final-answer reformulation of Problem 1, not a different problem that merely looks related.
  - The hypotheses, objects, degrees of freedom, and intended conclusion should match in substance, even if the wording differs.

  2. Difficulty / solution-spine equivalence
  - Solving Problem 2 should require essentially the same core ideas as solving Problem 1.
  - Given the reference solutions, the indispensable crux, key lemmas, structural identifications, or dependency spine should be equivalent in substance.
  - It is not enough that Solution 2 is written in a style similar to Solution 1. You must judge whether Problem 2 itself forces comparable work.
  - If Problem 2 admits a substantially easier shortcut, even if the provided Solution 2 does not use it, then the two problems are not equivalent in difficulty.

  Your final assessment must be one of the following:

  - 0 = not equivalent; the two problems are not essentially equivalent, or one is much easier than the other
  - 1 = equivalent; the two problems and their solutions are essentially equivalent in both content and difficulty

  Your analysis should be exceptionally careful and explicit, and it will be judged according to the following evaluation instruction:

  ```txt
  Here is the instruction to evaluate whether two problems are equivalent.

  A score of 1 should be given only if:
  - Problem 2 is a faithful reformulation of Problem 1 in substance, not merely in surface appearance,
  - the two problems are solving essentially the same mathematical task,
  - the core obstacle, indispensable lemmas, constructions, or structural identifications in the reference solutions are equivalent in substance,
  - and Problem 2 does not admit a materially easier route that bypasses the main crux of Problem 1.

  A score of 0 should be given if:
  - the two problems are not essentially solving the same task,
  - or the mismatch in assumptions, target, or structure is substantial,
  - or the core solution ideas are materially different,
  - or one problem is much easier than the other,
  - or Problem 2 can be solved by substantially more routine means than Problem 1.

  Important:
  - You must evaluate both the problem statements and the provided solutions.
  - But you must not be fooled by a solution that imitates another solution unnecessarily.
  - The real question is whether the statement of Problem 2 actually requires equivalent mathematical work, i.e. if the reference solution to Problem 2 actually needs all its steps.
  - If the provided Solution 2 is elaborate but the problem statement itself allows a much easier shortcut, this must count against equivalence.

  Your final response should be in the following format:

  Here is the analysis of the two problem, solution pairs: // Your analysis should start with this exact same phrase
  ... // Your analysis of the equivalence between the two problems (with solutions). You are required to analyze both statement-level consistency and difficulty-level equivalence. Your analysis should provide clear and detailed justification for its score according to the criteria provided above. In particular, if the score is 0.5, you must explicitly describe what concrete modifications to Problem 2 could raise the score to 1. If the score is 0, you must explicitly describe why the equivalency breaks, e.g. shortcut solution to Problem 2 or inconsistency in statements. If the score is 1, you must provide explicit justification for the faithfulness of the reformulation, and the necessity of difficulty in the reference solutions.

  Based on my evaluation of the two problem, solution pairs, the final equivalence score should be:
  \\boxed{{...}} // where ... should be the final overall score (0 or 1, and nothing else) based on the criteria above.

