# VoiceBench evaluation - (i) BASELINE setup - MCQ subtests
# S2S incremental V2 backend, SPEECH output.
# No inference boosting, no force turn taking.
# MCQ datasets (bbh, openbookqa, mmsu) require a system prompt.
# Checkpoint: Mar 2 2026 (Feb 26 STT + Mar 3 TTS, Megan speaker)
#
# Run:
#   python nemo_skills/dataset/voicebench/scripts/generate_from_api_and_score_official.py \
#     --config nemo_skills/dataset/voicebench/scripts/vb_baseline_02mar_mcq_config.yaml

# Cluster settings
cluster: s2s_eval_oci_iad
partition: batch_block1,batch_block3,batch_block4
cpu_partition: cpu

model: /lustre/fsw/portfolios/convai/users/ecasanova/Checkpoints/Nemotron-VoiceChat-november/duplex-eartts-10min_sw_et_eos_dp_eos_dup_fp32_1delay_02_March_exp_17_afg_long_FT_Megan_msr_34k_steps-stt-AS9.1_11002_new_branch_load_fixed

server_type: vllm
server_gpus: 1
num_chunks: 48

server_entrypoint: "-m nemo_skills.inference.server.serve_unified"
server_args: >-
  --backend s2s_incremental_v2
  --decode_audio
  --speaker_reference /lustre/fsw/portfolios/convai/users/ecasanova/Checkpoints/Mg_a_00759.wav
  --num_frames_per_inference 3
  --engine_type vllm_llm_vllm_eartts
  --use_perception_cache
  --use_perception_cudagraph
  --use_codec_cache
  --buffer_size_frames 21
  --codec_token_history_size 60
  --pad_audio_to_sec 40
  --repetition_penalty 1.0
  --matmul_precision medium
  --vllm_gpu_memory_utilization 0.35
  --vllm_max_model_len 8192
  --system_prompt "Answer the following multiple choice question with an explanation for the answer."
  --output_dir /lustre/fsw/portfolios/convai/users/mmkrtchyan/projects/speechLM/s2s/MAR_02_FIXED/baseline/vb_mcq_artifacts
  --batch_size 2
  --code_path /lustre/fsw/portfolios/convai/users/mmkrtchyan/projects/speechLM/s2s/NeMo
  --pip_install "hf-xet==1.1.9 huggingface-hub==0.34.4 nvidia-modelopt==0.33.1 nvidia-modelopt-core==0.33.1 tokenizers==0.22.0 transformers==4.56.0 lhotse==1.32.2 nv-one-logger-core==2.1.0 nv-one-logger-pytorch-lightning-integration==2.1.0 nv-one-logger-training-telemetry==2.1.0 kaldialign==0.9.1"

server_container: /lustre/fsw/portfolios/llmservice/users/erastorgueva/code/containers/triton25.05_s2svllm26.02.12.sqsh
server_server_type: vllm_multimodal

# Paths
data_dir: /lustre/fsw/portfolios/convai/users/mmkrtchyan/projects/speechLM/s2s/voicebench_data_dir
output_dir: /lustre/fsw/portfolios/convai/users/mmkrtchyan/projects/speechLM/s2s/MAR_02_FIXED/baseline/vb_mcq
voicebench_repo_path: /lustre/fsw/portfolios/llmservice/users/vmendelev/code/VoiceBench

subtests:
  - bbh
  - openbookqa
  - mmsu

# Scoring settings
api_type: nvidia
nvidia_model: azure/openai/gpt-4o-mini
agent_audio_asr_model: nvidia/parakeet-tdt-1.1b

installation_command: ""
agent_audio_installation_command: "ln -sf $(which python3) /usr/local/bin/python"
scoring_installation_command: "pip install sacrebleu qa_metrics"

expname: vb_baseline_02mar_mcq
generation_only: false
scoring_only: false
dry_run: false
