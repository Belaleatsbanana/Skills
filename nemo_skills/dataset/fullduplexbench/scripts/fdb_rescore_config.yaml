# Full-Duplex-Bench rescoring configuration
# Use this when you already have generated outputs and only need to rescore
# Run: python generate_from_api_and_score_official.py --config fdb_rescore_config.yaml

# Cluster settings
cluster: oci_iad
partition: cpu
cpu_partition: cpu

# Model settings (not used for scoring-only, but required field)
model: none
server_type: vllm
server_gpus: 0

# Paths
data_dir: /path/to/fullduplexbench/data_dir
output_dir: /path/to/output/runs/fullduplexbench  # Must contain eval-results/
fdb_repo_path: /path/to/Full-Duplex-Bench

# Subtests to rescore
subtests: all  # or specify: pause, backchannel, turn_taking, interruption

# Experiment settings
expname: fullduplexbench_rescore

# Run modes - SCORING ONLY
generation_only: false
scoring_only: true  # Key setting for rescoring
dry_run: false
