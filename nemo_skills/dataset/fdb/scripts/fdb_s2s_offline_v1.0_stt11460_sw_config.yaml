# Full-Duplex-Bench v1.0 evaluation configuration for S2S voicechat offline backend
# STT ckpt: checkpoints_hf_11460 (fix_seq_mask variant)
# S2S ckpt: /lustre/fsw/portfolios/convai/users/ecasanova/Checkpoints/Nemotron-VoiceChat-november/duplex-eartts-2mim_sw_et_eos_dp_eos_dup_fp32_1delay_main_branch-stt-AS7.8_11460_old_branch_generated_fixed/
# TTS ckpt: sliding window checkpoint (delay_1, step_24011)
# Ref: https://docs.google.com/document/d/1tLJlb5Fi8ECdoLwbnjQ2lM5JIj8OeVo_2PeoDzK9jQE/edit?tab=t.0#heading=h.d57shsy818cf

cluster: s2s_eval_oci_iad
partition: batch_block1,batch_block3,batch_block4
# partition: interactive
cpu_partition: cpu

model: /lustre/fsw/portfolios/llmservice/users/apasad/projects/nemo_s2s_merged_dec/exp_SFT-nano9b/IAD_nano9b_parakeet600m_from_PT_32k_64gpu_5e-5_PT0.5_SFT0.15_QA0.02_TEXT0.1_loss0.5_MCQ0.03_prompt2_ASR0.01_fillerlong_offset2_sysp0.05_NoiseDefault_asr_dtc2_dst15_lossDefault_ei0.033_ot8_TN_all_data_v3.2_ir_fix_seq_mask/checkpoints_hf_11460

server_type: vllm
server_gpus: 1
num_chunks: 32 # Adjust based on dataset size

# Use serve_unified with S2S voicechat backend
server_entrypoint: "-m nemo_skills.inference.server.serve_unified"
server_args: >-
  --backend s2s_voicechat
  --decode_audio
  --config_path /lustre/fsw/portfolios/llmservice/users/kevinhu/projects/duplex-stt/config/inference/infer_nano_eartts_Fullduplexbench_Jan22_2026.yaml
  --speaker_reference /lustre/fsw/portfolios/convai/users/ecasanova/S2S-full-duplex/inference_references/Emma_S3_A1_SC7_singleturntarget_21_channel_1_audio_in.wav
  --tts_ckpt_path /lustre/fsw/portfolios/convai/users/ecasanova/Checkpoints/Duplex_EARTTS/eartts_rvq_cont_task_nanov2_tts_pretraining_wordlist_duplex_data_new_branch_new_tok_4nodes_duplex_eartts_nemo_main_delay_1_step_24011-last.ckpt
  --extra_decoding_seconds 0
  --ignore_system_prompt
  --inference_pad_boost -0.5
  --inference_bos_boost 0.5
  --inference_eos_boost 0
  --dtype float32
  --code_path /lustre/fsw/portfolios/convai/users/kevinhu/S2S-Duplex-new-codebase/branches/NeMo-release_not_rebased

server_container: /lustre/fsw/portfolios/convai/users/ecasanova/docker_images/nemo_duplex_november_eartts.sqsh
scoring_container: /lustre/fsw/portfolios/convai/users/ecasanova/docker_images/nemo_duplex_november_eartts.sqsh

server_server_type: vllm_multimodal

fdb_version: v1.0

# data_dir must point to fdb so benchmarks resolve to fdb/fdb_v1/* and fdb/fdb_v1_5/*
data_dir: /lustre/fsw/portfolios/convai/users/mmkrtchyan/projects/speechLM/s2s/Skills/nemo_skills/dataset/fdb
output_dir: /lustre/fsw/portfolios/convai/users/mmkrtchyan/projects/speechLM/s2s/fdb_v1_0_stt11460_sw_voicechat
fdb_repo_path: /lustre/fsw/portfolios/convai/users/mmkrtchyan/projects/speechLM/s2s/Full-Duplex-Bench
# fdb_repo_path: /lustre/fsw/portfolios/llmservice/users/kevinhu/Full-Duplex-Bench-NV
fdb_data_path: /lustre/fsw/portfolios/convai/users/mmkrtchyan/projects/speechLM/s2s/Full-Duplex-Bench-data

# Turn taking only (boost + merge run)
subtests:
  - backchannel
  - pause_candor
  - pause_synthetic
  - turn_taking
  - interruption

installation_command: ""
scoring_installation_command: "pip install numpy scipy scikit-learn silero-vad soundfile"

expname: fdb_v1_0_stt11460_sw_s2s_offline
# max_samples: 50  # Uncomment to limit samples for testing

# FDB prepare always writes stereo (2ch) output.wav and runs ASR with --stereo; no config to disable.
# Stereo convention with --merge_user_channel flag (matches reference inference/scoring): ch0 = user/input, ch1 = model/output.

# Always use more tokens (1024) and reference sampling (temperature=0.8, top_p=0.8). See REFERENCE_INFERENCE_PARAMS.md.
# inference_overrides: "++inference.temperature=0.8 ++inference.top_p=0.8 ++inference.tokens_to_generate=1024"

# FDB prepare always writes stereo (2ch) output.wav and runs ASR with --stereo; no config to disable.

generation_only: false
scoring_only: false
dry_run: false
