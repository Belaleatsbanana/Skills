# Full-Duplex-Bench v1.5 evaluation - (ii) MATCHED_DEMO_V1 setup
# S2S incremental V2 backend, backchannel only.
# Baseline + force_turn_taking + inference_user_pad_boost=0.8
# Requires nemotron_h.py vLLM patch for boost params to take effect.
# Checkpoint: Mar 2 2026 (Feb 26 STT + Mar 3 TTS, Megan speaker)
#
# Run:
#   python nemo_skills/dataset/fdb/scripts/run_eval.py \
#     --config nemo_skills/dataset/fdb/scripts/fdb_v1.5_matched_demo_v1_02mar_config.yaml

cluster: s2s_eval_oci_iad
partition: batch_block1,batch_block3,batch_block4
cpu_partition: cpu

model: /lustre/fsw/portfolios/convai/users/ecasanova/Checkpoints/Nemotron-VoiceChat-november/duplex-eartts-10min_sw_et_eos_dp_eos_dup_fp32_1delay_02_March_exp_17_afg_long_FT_Megan_msr_34k_steps-stt-AS9.1_11002_new_branch_load_fixed

server_type: vllm
server_gpus: 1
num_chunks: 8

server_entrypoint: "-m nemo_skills.inference.server.serve_unified"
server_args: >-
  --backend s2s_incremental_v2
  --decode_audio
  --speaker_reference /lustre/fsw/portfolios/convai/users/ecasanova/Checkpoints/Mg_a_00759.wav
  --num_frames_per_inference 3
  --engine_type vllm_llm_vllm_eartts
  --use_perception_cache
  --use_perception_cudagraph
  --use_codec_cache
  --buffer_size_frames 21
  --codec_token_history_size 60
  --repetition_penalty 1.0
  --matmul_precision medium
  --vllm_gpu_memory_utilization 0.35
  --vllm_max_model_len 8192
  --ignore_system_prompt
  --merge_user_channel_v2
  --force_turn_taking
  --inference_user_pad_boost 0.8
  --output_dir /lustre/fsw/portfolios/convai/users/mmkrtchyan/projects/speechLM/s2s/MAR_02_FIXED/matched_demo_v1/fdb_v1.5_artifacts
  --code_path /lustre/fsw/portfolios/convai/users/mmkrtchyan/projects/speechLM/s2s/NeMo
  --pip_install "hf-xet==1.1.9 huggingface-hub==0.34.4 nvidia-modelopt==0.33.1 nvidia-modelopt-core==0.33.1 tokenizers==0.22.0 transformers==4.56.0 lhotse==1.32.2 nv-one-logger-core==2.1.0 nv-one-logger-pytorch-lightning-integration==2.1.0 nv-one-logger-training-telemetry==2.1.0 kaldialign==0.9.1"

server_container: /lustre/fsw/portfolios/llmservice/users/erastorgueva/code/containers/triton25.05_s2svllm26.02.12.sqsh
scoring_container: /lustre/fsw/portfolios/convai/users/ecasanova/docker_images/nemo_duplex_november_eartts.sqsh

server_server_type: vllm_multimodal

fdb_version: v1.5

data_dir: /lustre/fsw/portfolios/convai/users/mmkrtchyan/projects/speechLM/s2s/Skills/nemo_skills/dataset/fdb
output_dir: /lustre/fsw/portfolios/convai/users/mmkrtchyan/projects/speechLM/s2s/MAR_02_FIXED/matched_demo_v1/fdb_v1.5
fdb_repo_path: /lustre/fsw/portfolios/convai/users/mmkrtchyan/projects/speechLM/s2s/Full-Duplex-Bench
fdb_data_path: /lustre/fsw/portfolios/convai/users/mmkrtchyan/projects/speechLM/s2s/Full-Duplex-Bench-data

subtests:
  - backchannel

installation_command: "mkdir -p /usr/local/lib/python3.12/dist-packages/vllm/model_executor/models && cp /lustre/fsw/portfolios/convai/users/mmkrtchyan/projects/speechLM/s2s/nemotron_h.py /usr/local/lib/python3.12/dist-packages/vllm/model_executor/models/nemotron_h.py"
scoring_installation_command: "pip install numpy scipy scikit-learn silero-vad soundfile"

expname: fdb_v1.5_matched_demo_v1_02mar

generation_only: false
scoring_only: false
dry_run: false
