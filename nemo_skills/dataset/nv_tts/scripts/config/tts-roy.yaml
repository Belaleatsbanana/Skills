# TTS Pipeline Configuration

# Cluster and execution settings (shared across all stages)
cluster: eos-roy
container: /lustre/fsw/convai_convaird_nemo-speech/data/containers/nemo_25.11-260122.sqsh
partition: batch # batch # interactive
mount_paths: /lustre:/lustre
# Will be combined with `expname` provided to `run_tts_eval.py` to form the final output directory
output_dir: /lustre/fsw/llmservice_nemo_speechlm/users/rfejgin/skills/outputs

# NeMo code path (adds to PYTHONPATH).
# Generation: generation_code_path OR generation_code_repo + generation_code_commit.
# Scoring defaults to the generation code path; override with scoring_code_path / scoring_code_repo + scoring_code_commit.
generation_code_repo: https://github.com/rfejgin/NeMo.git
generation_code_commit: 0494d6284346ab5d8e12e7e0335789591cda5b9b
#scoring_code_repo: https://github.com/rfejgin/NeMo.git
#scoring_code_commit: <sha>

# Generation settings (ns eval arguments)
generation:
  benchmarks: nv_tts.vctk # nv_tts.libritts_test_clean,nv_tts.libritts_seen,nv_tts.riva_hard_digits,nv_tts.riva_hard_letters,nv_tts.riva_hard_money,nv_tts.riva_hard_short,nv_tts.vctk
  model: my-checkpoint-symbolic-name # or HF path like nvidia/magpie_tts_multilingual_357m
  server_type: generic
  server_gpus: 1
  server_entrypoint: python -m nemo_skills.inference.server.serve_unified
  server_args: >-
    --backend magpie_tts
    --codec_model nvidia/nemo-nano-codec-22khz-1.89kbps-21.5fps
    --batch_size 32
    --batch_timeout 0.1
    --use_cfg
    --cfg_scale 2.5
    --longform_mode never
    --hparams_file "/lustre/fsw/llmservice_nemo_speechlm/users/rfejgin/new/rfejgin_lt_natural/lt_21_natural_2x_context10_layer2_dim768/hparams.yaml"
    --checkpoint_file "/lustre/fsw/llmservice_nemo_speechlm/users/rfejgin/new/rfejgin_lt_natural/lt_21_natural_2x_context10_layer2_dim768/checkpoints/Magpie-TTS-ML--val_loss=10.1168-step=420020-last.ckpt"
  data_dir: /lustre/fsw/llmservice_nemo_speechlm/users/rfejgin/skills/data_dir
  num_chunks: 8
  gpus_per_node: 8  # set to 1 for single-GPU mode, or 8 for multi-instance mode (num_chunks must be multiple of gpus_per_node)
  extra_args: ++server.server_type=vllm_multimodal

# Scoring settings
scoring:
  sv_model: titanet
  asr_model_name: nvidia/parakeet-tdt-1.1b
  language: en
  with_utmosv2: true
  codec_model_path: nvidia/nemo-nano-codec-22khz-1.89kbps-21.5fps
  gpus: 1
  num_chunks: 8  # number of parallel scoring jobs (set to null or remove for single-job scoring)
