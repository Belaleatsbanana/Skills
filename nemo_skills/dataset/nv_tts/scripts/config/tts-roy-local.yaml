# TTS Pipeline Configuration

# Cluster and execution settings (shared across all stages)
cluster: local
container: nvcr.io/nvidia/nemo:25.11
partition: non_applicable
mount_paths: /home/rfejgin:/home/rfejgin,/home/rfejgin/workspace:/workspace,/datap/misc/Datasets:/Data,/datap:/datap
output_dir: /workspace/nemo-skills/eval_results

# NeMo code path for generation server (adds to PYTHONPATH)
generation_code_path: /home/rfejgin/NeMo_LT/NeMo
# NeMo code path for scoring (adds to PYTHONPATH)
scoring_code_path: /home/rfejgin/NeMo_LT/NeMo
# Generation settings (ns eval arguments)
generation:
  benchmarks: nv_tts.libritts_seen #,nv_tts.libritts_test_clean #,nv_tts.riva_hard_digits,nv_tts.riva_hard_letters,nv_tts.riva_hard_money,nv_tts.riva_hard_short,nv_tts.vctk
  model: my-checkpoint-symbolic-name # or HF path like nvidia/magpie_tts_multilingual_357m
  server_type: generic
  server_gpus: 1
  server_entrypoint: python -m nemo_skills.inference.server.serve_unified
  server_args: >-
    --backend magpie_tts
    --codec_model nvidia/nemo-nano-codec-22khz-1.89kbps-21.5fps
    --batch_size 32
    --batch_timeout 0.1
    --use_cfg
    --cfg_scale 2.5
    --longform_mode never
    --checkpoint_file "/datap/cp/lt_natural_full/lt_21_natural_4x/checkpoints/Magpie-TTS-ML--val_loss=10.5923-step=352475-last.ckpt"
    --hparams_file "/datap/cp/lt_natural_full/lt_21_natural_4x/hparams.yaml"
  data_dir: /home/rfejgin/Skills/nemo_skills/dataset
  num_chunks: 1
  gpus_per_node: 1  # set to 1 for single-GPU mode, or 8 for multi-instance mode (num_chunks must be multiple of gpus_per_node)
  extra_args: ++server.server_type=vllm_multimodal

# Scoring settings
scoring:
  sv_model: titanet
  asr_model_name: nvidia/parakeet-tdt-1.1b
  language: en
  with_utmosv2: true
  with_fcd: true
  codec_model_path: nvidia/nemo-nano-codec-22khz-1.89kbps-21.5fps
  gpus: 1
  # num_chunks: 1  # set to >1 to enable parallel scoring across multiple GPUs
